name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + type check ────────────────────────────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  # ── Unit tests (Jest) ────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npx jest --passWithNoTests

  # ── E2E tests (Playwright) ───────────────────────────────────────────────────
  # • On PR to main  → waits for Vercel preview, runs E2E against preview URL
  # • On push to main → waits for production deployment, runs E2E against prod
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── PR: poll Vercel API until preview for this commit is READY ──────────
      - name: Wait for Vercel preview deployment (PR only)
        if: github.event_name == 'pull_request'
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          # On pull_request events github.sha is the merge commit SHA, not the
          # branch HEAD. Vercel tags the preview with the real HEAD SHA, so we
          # must use event.pull_request.head.sha to match.
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Looking for Vercel preview for SHA: $COMMIT_SHA"
          for i in $(seq 1 40); do
            response=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=10" \
              || echo "{}")
            url=$(echo "$response" | jq -r --arg sha "$COMMIT_SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY") | "https://\(.url)"' \
              2>/dev/null | head -1)
            if [ -n "$url" ]; then
              echo "✅ Preview ready after $((i * 15))s: $url"
              echo "url=$url" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i/40: no ready deployment yet, retrying in 15s..."
            sleep 15
          done
          echo "❌ Timeout: Vercel preview was not ready within 10 minutes"
          exit 1

      # ── Main: wait for production to serve this exact commit SHA ─────────────
      - name: Wait for production deployment (main only)
        if: github.event_name == 'push'
        id: production
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for production deployment of commit $COMMIT_SHA..."
          for i in $(seq 1 24); do
            deployed_sha=$(curl -sf https://keza-taupe.vercel.app/api/version \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            echo "Attempt $i/24: deployed=$deployed_sha"
            if [ "$deployed_sha" = "$COMMIT_SHA" ]; then
              echo "✅ Production is live after $((i * 15))s"
              echo "url=https://keza-taupe.vercel.app" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 15
          done
          echo "❌ Timeout: production did not go live within 6 minutes"
          exit 1

      - name: Run Playwright E2E tests (PR → preview)
        if: github.event_name == 'pull_request'
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}

      - name: Run Playwright E2E tests (main → production)
        if: github.event_name == 'push'
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.production.outputs.url }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
