name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (Jest) ────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npx jest --passWithNoTests

  # ── E2E tests (Playwright) ───────────────────────────────────────────────────
  # Runs only on pushes to main, after unit tests pass.
  # Waits for Vercel to finish deploying the current commit before running tests.
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel deployment
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Waiting for deployment of commit $COMMIT_SHA..."
          for i in $(seq 1 24); do
            deployed_sha=$(curl -sf https://keza-taupe.vercel.app/api/version \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            echo "Attempt $i/24: deployed=$deployed_sha"
            if [ "$deployed_sha" = "$COMMIT_SHA" ]; then
              echo "✅ Correct version is live after $((i * 15))s"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Timeout: deployment did not go live within 6 minutes"
          exit 1

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: https://keza-taupe.vercel.app

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
